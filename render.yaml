databases:
  - name: smart-attendance-db
    databaseName: attendance_db
    user: attendance_user
    plan: free

services:
  - type: web
    name: smart-attendance-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        fromDatabase:
          name: smart-attendance-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: SUPER_MASTER_EMAIL
        sync: false
      - key: SUPER_MASTER_PASSWORD
        sync: false
      - key: SUPER_MASTER_NAME
        value: Super Master
      - key: SUPER_MASTER_PHONE
        sync: false

  - type: web
    name: smart-attendance-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: smart-attendance-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
